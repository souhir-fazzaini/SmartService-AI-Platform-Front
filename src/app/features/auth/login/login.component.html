<div class="login-container">



  <form (ngSubmit)="login()">

    <input
      type="text"
      placeholder="Email"
      [(ngModel)]="email"
      name="email"
      required
    />

    <input
      type="password"
      placeholder="Password"
      [(ngModel)]="password"
      name="password"
      required
    />

    <button type="submit">Login</button>

  </form>

</div>
