<div class="bookings">

  <h2>My Bookings</h2>

  <div class="booking-card" *ngFor="let b of bookings">

    <div class="info">
      <h3>{{ b.service }}</h3>
      <p>Date: {{ b.date }}</p>
    </div>

    <div class="status" [ngClass]="b.status.toLowerCase()">
      {{ b.status }}
    </div>

    <button (click)="cancelBooking(b.id)" *ngIf="b.status !== 'Cancelled'">
      Cancel
    </button>

  </div>

</div>
